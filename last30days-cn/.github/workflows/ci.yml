name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }} / ${{ matrix.extras }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]
        extras: [none, jieba]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Install optional jieba
        if: matrix.extras == 'jieba'
        run: python -m pip install jieba

      - name: Run tests
        run: python -m pytest tests -q

      - name: Check payload drift
        run: python scripts/build_payload.py --check
